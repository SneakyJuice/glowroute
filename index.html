<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowRoute | Find Aesthetic Clinics</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <a href="/">GlowRoute</a>
            </div>
            <div class="search-container">
                <div class="search-wrapper">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Find aesthetic clinics near you..." aria-label="Search clinics">
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" aria-label="User Menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="page-container">
            <aside class="filters-sidebar">
                <h2 class="filters-title">Filter by Specialty</h2>
                <div class="filter-group">
                    <label class="filter-checkbox">
                        <input type="checkbox" name="specialty" value="injectables">
                        <span class="checkmark"></span>
                        Injectables
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" name="specialty" value="skincare">
                        <span class="checkmark"></span>
                        Advanced Skincare
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" name="specialty" value="lasers">
                        <span class="checkmark"></span>
                        Laser Treatments
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" name="specialty" value="wellness">
                        <span class="checkmark"></span>
                        Wellness & IV
                    </label>
                    <label class="filter-checkbox">
                        <input type="checkbox" name="specialty" value="body">
                        <span class="checkmark"></span>
                        Body Contouring
                    </label>
                </div>
                
                <h2 class="filters-title mt-8">Sort By</h2>
                <div class="filter-group">
                    <label class="filter-radio">
                        <input type="radio" name="sort" value="recommended" checked>
                        <span class="radio-mark"></span>
                        Curated for you
                    </label>
                    <label class="filter-radio">
                        <input type="radio" name="sort" value="rating">
                        <span class="radio-mark"></span>
                        Highest Rated
                    </label>
                    <label class="filter-radio">
                        <input type="radio" name="sort" value="glowscore">
                        <span class="radio-mark"></span>
                        Glowscore
                    </label>
                    <label class="filter-radio">
                        <input type="radio" name="sort" value="distance">
                        <span class="radio-mark"></span>
                        Distance
                    </label>
                </div>
            </aside>

            <section class="results-section">
                <div class="results-header">
                    <h1 class="page-title">Curated Aesthetic Care</h1>
                    <p class="results-count" id="resultsCount">8 verified providers</p>
                </div>

                <div class="clinics-list" id="clinicsList">
                    <!-- Clinic cards will be injected here via JS -->
                </div>
            </section>
        </div>
    </main>

    <template id="clinicCardTemplate">
        <article class="clinic-card">
            <div class="card-image-wrapper">
                <img src="" alt="Clinic Image" class="clinic-image">
            </div>
            <div class="card-content">
                <div class="card-header">
                    <div class="title-row">
                        <h3 class="clinic-name"></h3>
                        <span class="verified-badge">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                            Verified
                        </span>
                    </div>
                    <div class="rating-row">
                        <div class="stars" aria-label="Rating">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        </div>
                        <span class="review-count"></span>
                    </div>
                </div>
                
                <p class="clinic-location"></p>
                <p class="clinic-description"></p>
                
                <div class="services-list">
                    <!-- Service tags injected here -->
                </div>
                
                <div class="card-footer">
                    <button class="btn btn-primary cta-reserve">Reserve your consultation</button>
                    <a href="#" class="btn-link">View Provider Profile</a>
                </div>
            </div>
        </article>
    </template>

    <script src="script.js"></script>
</body>
</html>
